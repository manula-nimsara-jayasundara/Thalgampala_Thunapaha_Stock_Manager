name: Android CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Test and Build Android App
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up JDK 21 (Required for Gradle 9.x and AGP 9.x)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 3. Cache Gradle dependencies to speed up future pipeline runs
      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      # 4. Make sure the gradlew execution script has proper Linux permissions
      - name: Grant Execute Permission to Gradlew
        run: chmod +x ./gradlew

      # 5. Run Lint check (Continue even if it fails to avoid blocking the build)
      - name: Run Lint
        run: ./gradlew lintDebug
        continue-on-error: true

      # 6. Run Unit Tests (Continue even if it fails to avoid blocking the build)
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest
        continue-on-error: true

      # 7. Build APKs (Debug and Release)
      - name: Build APKs
        run: ./gradlew assembleDebug assembleRelease

      # 8. Upload Debug APK
      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # 9. Upload Unsigned Release APK
      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/debug-apk/*.apk
            artifacts/release-apk-unsigned/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
