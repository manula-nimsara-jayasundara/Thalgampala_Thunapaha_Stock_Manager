name: Android CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Test and Build Android App
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up the correct JDK version for your project (e.g., JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Cache Gradle dependencies to speed up future pipeline runs
      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      # 4. Make sure the gradlew execution script has proper Linux permissions
      - name: Grant Execute Permission to Gradlew
        run: chmod +x ./gradlew

      # 5. Run your local Unit Tests
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      # 6. Build the Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 7. Save the generated APK as a downloadable GitHub artifact
      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk